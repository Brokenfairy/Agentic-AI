name: comparison_engine
version: 0.1.0
category: synthesis
agent: comparison_engine_agent
always_on: false
description: >
  Compares extracted records across websites to identify the best deal,
  highest rating, price deltas, and ranked output.
triggers:
  keywords:
    - compare
    - best
    - lowest
    - highest
    - rank
  always_on: false
inputs:
  - extracted_data
outputs:
  - comparison_results
dependencies:
  - url_scraper
  - price_extractor
phase_1_stub: false
