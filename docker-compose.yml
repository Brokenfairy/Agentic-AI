version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
      - "8000:8000"
    environment:
      - DEMO_MODE=true
      - DEMO_PRESENTATION_MODE=true
      - DATABASE_PATH=/app/database/skillflow.db
    volumes:
      - .:/app
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_PATH=/app/database/skillflow.db
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
