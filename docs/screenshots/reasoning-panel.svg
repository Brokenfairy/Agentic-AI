  <text x="90" y="110" fill="#f8fafc" font-size="34" font-family="Arial">Supervisor Reasoning Panel</text>
  <text x="90" y="145" fill="#94a3b8" font-size="18" font-family="Arial">Why the supervisor selected or skipped each agent</text>
  <rect x="90" y="180" width="1020" height="70" rx="14" fill="#172033" stroke="#2563eb"/>
